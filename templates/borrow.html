<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borrow Book</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .search-input {
            position: relative;
        }
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-top: none;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        .search-results.show {
            display: block;
        }
        .search-result-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .search-result-item:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
{% include 'navbar.html' %}
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="col-lg-8 col-xl-7">
        <div class="card p-4 shadow-lg bg-white bg-opacity-90">
                <h2 class="mb-4"><i class="fa-solid fa-book-open-reader me-2 text-primary"></i>Borrow Book</h2>
                <form method="post" id="borrowForm">
                    <!-- Member Search Section -->
                    <div class="mb-3">
                        <label for="member_search" class="form-label">Search Member</label>
                        <div class="search-input">
                            <input type="text" class="form-control" id="member_search" placeholder="Search by member name or ID..." autocomplete="off">
                            <div class="search-results" id="memberResults"></div>
                        </div>
                        <select class="form-select mt-2" id="member_id" name="member_id" required>
                            <option value="">-- Select a Member --</option>
                            {% for member in members %}
                            <option value="{{ member.member_id }}" data-name="{{ member.name }}">{{ member.name }} ({{ member.member_id }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Book Search Section -->
                    <div class="mb-3">
                        <label for="book_search" class="form-label">Search Book</label>
                        <div class="search-input">
                            <input type="text" class="form-control" id="book_search" placeholder="Search by book title, author, or ID..." autocomplete="off">
                            <div class="search-results" id="bookResults"></div>
                        </div>
                        <select class="form-select mt-2" id="book_id" name="book_id" required>
                            <option value="">-- Select a Book --</option>
                            {% for book in books %}
                            <option value="{{ book.book_id }}" data-title="{{ book.title }}" data-author="{{ book.author }}">{{ book.title }} ({{ book.book_id }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex flex-wrap gap-2 mt-3">
                        <button type="submit" class="btn btn-primary btn-lg"><i class="fa fa-book-reader me-1"></i>Borrow</button>
                        <a href="{{ url_for('books') }}" class="btn btn-secondary btn-lg"><i class="fa fa-arrow-left me-1"></i>Back to Books</a>
                        <a href="{{ url_for('home') }}" class="btn btn-secondary btn-lg"><i class="fa fa-home me-1"></i>Home</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Member Search Functionality
        const memberSearch = document.getElementById('member_search');
        const memberResults = document.getElementById('memberResults');
        const memberSelect = document.getElementById('member_id');

        memberSearch.addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const options = memberSelect.querySelectorAll('option');
            let hasResults = false;
            memberResults.innerHTML = '';

            if (searchTerm.length < 1) {
                memberResults.classList.remove('show');
                return;
            }

            options.forEach(option => {
                if (option.value === '') return;
                const name = option.getAttribute('data-name').toLowerCase();
                const id = option.value.toLowerCase();
                
                if (name.includes(searchTerm) || id.includes(searchTerm)) {
                    hasResults = true;
                    const div = document.createElement('div');
                    div.className = 'search-result-item';
                    div.textContent = option.text;
                    div.onclick = function() {
                        memberSelect.value = option.value;
                        memberSearch.value = '';
                        memberResults.classList.remove('show');
                    };
                    memberResults.appendChild(div);
                }
            });

            if (hasResults) {
                memberResults.classList.add('show');
            } else {
                memberResults.classList.remove('show');
            }
        });

        // Book Search Functionality
        const bookSearch = document.getElementById('book_search');
        const bookResults = document.getElementById('bookResults');
        const bookSelect = document.getElementById('book_id');

        bookSearch.addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const options = bookSelect.querySelectorAll('option');
            let hasResults = false;
            bookResults.innerHTML = '';

            if (searchTerm.length < 1) {
                bookResults.classList.remove('show');
                return;
            }

            options.forEach(option => {
                if (option.value === '') return;
                const title = option.getAttribute('data-title').toLowerCase();
                const author = option.getAttribute('data-author').toLowerCase();
                const id = option.value.toLowerCase();
                
                if (title.includes(searchTerm) || author.includes(searchTerm) || id.includes(searchTerm)) {
                    hasResults = true;
                    const div = document.createElement('div');
                    div.className = 'search-result-item';
                    div.textContent = option.text;
                    div.onclick = function() {
                        bookSelect.value = option.value;
                        bookSearch.value = '';
                        bookResults.classList.remove('show');
                    };
                    bookResults.appendChild(div);
                }
            });

            if (hasResults) {
                bookResults.classList.add('show');
            } else {
                bookResults.classList.remove('show');
            }
        });

        // Close search results when clicking outside
        document.addEventListener('click', function(event) {
            if (!event.target.closest('.search-input')) {
                memberResults.classList.remove('show');
                bookResults.classList.remove('show');
            }
        });
    </script>
</body>
</html>
