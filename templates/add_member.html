<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Member</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
{% include 'navbar.html' %}
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="col-lg-8 col-xl-7">
        <div class="card p-4 shadow-lg bg-white bg-opacity-90">
            <h2 class="mb-4"><i class="fa-solid fa-user-plus me-2 text-primary"></i>Add Member</h2>
            <form method="post">
                <div class="mb-3">
                    <label for="role" class="form-label">Category</label>
                    <select class="form-select" id="role" name="role" onchange="toggleMemberFields()">
                        <option value="student">Student</option>
                        <option value="staff">Staff</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="member_id" class="form-label">Member ID</label>
                    <input type="text" class="form-control" id="member_id" name="member_id" required>
                </div>
                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="text" class="form-control" id="phone" name="phone" required pattern="\d{10}" maxlength="10" title="Please enter a 10-digit phone number.">
                </div>
                <div id="student-fields">
                    <div class="mb-3">
                        <label for="student_id" class="form-label">Student ID</label>
                        <input type="text" class="form-control" id="student_id" name="student_id">
                    </div>
                    <div class="mb-3">
                        <label for="department" class="form-label">Department</label>
                        <input type="text" class="form-control" id="department" name="department">
                    </div>
                    <div class="mb-3">
                        <label for="year" class="form-label">Year</label>
                        <input type="text" class="form-control" id="year" name="year">
                    </div>
                </div>
                <div class="d-flex flex-wrap gap-2 mt-3">
                    <button type="submit" class="btn btn-primary btn-lg"><i class="fa fa-user-plus me-1"></i>Add Member</button>
                    <a href="{{ url_for('members') }}" class="btn btn-secondary btn-lg"><i class="fa fa-arrow-left me-1"></i>Back to Members</a>
                </div>
            </form>
            <hr class="my-4">
            <div id="student-import-section">
                <h3 class="mb-3"><i class="fa-solid fa-file-csv me-2 text-success"></i>Bulk Import Students from CSV</h3>
                <form method="post" action="{{ url_for('import_students') }}" enctype="multipart/form-data" class="mb-4">
                    <div class="mb-3">
                        <label for="csv_file" class="form-label">CSV File</label>
                        <input type="file" class="form-control" id="csv_file" name="file" accept=".csv" required>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg"><i class="fa fa-upload me-1"></i>Import Students</button>
                </form>
                <div class="mt-3">
                    <strong>CSV Format:</strong>
                    <pre>username,password,student_id,department,year</pre>
                </div>
            </div>
            <script>
                function toggleMemberFields() {
                    var role = document.getElementById('role').value;
                    var studentFields = document.getElementById('student-fields');
                    var importSection = document.getElementById('student-import-section');
                    if (role === 'student') {
                        studentFields.style.display = '';
                        if(importSection) importSection.style.display = '';
                    } else {
                        studentFields.style.display = 'none';
                        if(importSection) importSection.style.display = 'none';
                    }
                }
                document.addEventListener('DOMContentLoaded', function() {
                    toggleMemberFields();
                });
            </script>
        </div>
    </div>
</div>
</body>
</html>
