<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Book</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
{% include 'navbar.html' %}
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="col-lg-8 col-xl-7">
        <div class="card p-4 shadow-lg bg-white bg-opacity-90">
                <h2 class="mb-4"><i class="fa-solid fa-book-medical me-2 text-primary"></i>Add Book</h2>
                <form method="post">
                    <div class="mb-3">
                        <label for="book_id" class="form-label">Book ID</label>
                        <input type="text" class="form-control" id="book_id" name="book_id" required>
                    </div>
                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label for="author" class="form-label">Author</label>
                        <input type="text" class="form-control" id="author" name="author" required>
                    </div>
                    <div class="mb-3">
                        <label for="isbn" class="form-label">ISBN</label>
                        <input type="text" class="form-control" id="isbn" name="isbn" required>
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">Category</label>
                        <input type="text" class="form-control" id="category" name="category" value="General">
                    </div>
                    <div class="mb-3">
                        <label for="copies" class="form-label">Copies</label>
                        <input type="number" class="form-control" id="copies" name="copies" value="1" min="1">
                    </div>
                    <div class="d-flex flex-wrap gap-2 mt-3">
                        <button type="submit" class="btn btn-primary btn-lg"><i class="fa fa-plus me-1"></i>Add Book</button>
                        <a href="{{ url_for('books') }}" class="btn btn-secondary btn-lg"><i class="fa fa-arrow-left me-1"></i>Back to Books</a>
                    </div>
                </form>
                <hr class="my-4">
                <h3 class="mb-3"><i class="fa-solid fa-file-csv me-2 text-success"></i>Bulk Import Books from CSV</h3>
                <form method="post" action="{{ url_for('import_books') }}" enctype="multipart/form-data" class="mb-4">
                    <div class="mb-3">
                        <label for="csv_file" class="form-label">CSV File</label>
                        <input type="file" class="form-control" id="csv_file" name="file" accept=".csv" required>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg"><i class="fa fa-upload me-1"></i>Import Books</button>
                </form>
                <div class="mt-3">
                    <strong>CSV Format:</strong>
                    <pre>book_id,title,author,isbn,category,copies</pre>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
